{% extends "core/base.html" %}
{% block content %}
<section class="login-section" style="padding: 150px 0; min-height: 90vh; display: flex; align-items: center;">
    <div class="container">
        <div class="form-container" style="max-width: 450px; margin: 0 auto; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid var(--border-color);">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="font-size: 2rem; color: var(--text-dark);">Client Login</h2>
                <p style="color: var(--text-light);">Access your project dashboard</p>
            </div>

            {% if form.errors %}
                <div class="alert alert-error" style="background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem;">
                    Invalid username or password. Please try again.
                </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group" style="margin-bottom: 20px;">
                    <label for="id_username" style="display: block; margin-bottom: 8px; font-weight: 500;">Username</label>
                    <input type="text" name="username" id="id_username" class="form-control" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); outline: none;" required>
                </div>
                <div class="form-group" style="margin-bottom: 30px;">
                    <label for="id_password" style="display: block; margin-bottom: 8px; font-weight: 500;">Password</label>
                    <input type="password" name="password" id="id_password" class="form-control" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); outline: none;" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Sign In</button>
            </form>
            
            <div style="text-align: center; margin-top: 25px;">
                <p style="font-size: 0.9rem; color: var(--text-light);">
                    Don't have an account? <a href="{% url 'core:contact' %}" style="color: var(--primary-color); font-weight: 600;">Contact us</a>
                </p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
