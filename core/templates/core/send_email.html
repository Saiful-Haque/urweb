{% extends "core/admin_base.html" %}

{% block title %}Compose Email | urweb{% endblock %}

{% block admin_content %}
<div class="content-header" style="margin-bottom: 30px;">
    <h1 style="font-size: 1.8rem; margin: 0 0 8px 0; font-weight: 800;">Compose Email</h1>
    <p style="color: var(--text-muted); margin: 0; font-size: 0.95rem;">Send a professional response via your configured Gmail SMTP.</p>
</div>

<div class="dashboard-panel" style="max-width: 800px; background: white; padding: 40px; border-radius: 20px;">
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 24px;">
            <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #1E293B; margin-bottom: 10px;">Recipient Email</label>
            <div style="position: relative;">
                <i data-lucide="mail" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: #94A3B8;"></i>
                <input type="email" name="to_email" value="{{ initial_to }}" required placeholder="recipient@example.com"
                    style="width: 100%; padding: 14px 16px 14px 48px; border: 1px solid #E2E8F0; border-radius: 12px; font-size: 0.95rem; outline: none; transition: border-color 0.2s;">
            </div>
        </div>

        <div style="margin-bottom: 24px;">
            <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #1E293B; margin-bottom: 10px;">Subject Line</label>
            <div style="position: relative;">
                <i data-lucide="heading" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: #94A3B8;"></i>
                <input type="text" name="subject" value="{{ initial_subject }}" required placeholder="Enter subject..."
                    style="width: 100%; padding: 14px 16px 14px 48px; border: 1px solid #E2E8F0; border-radius: 12px; font-size: 0.95rem; outline: none;">
            </div>
        </div>

        <div style="margin-bottom: 30px;">
            <label style="display: block; font-size: 0.85rem; font-weight: 700; color: #1E293B; margin-bottom: 10px;">Message Content</label>
            <textarea name="message" required placeholder="Write your professional response here..."
                style="width: 100%; height: 300px; padding: 20px; border: 1px solid #E2E8F0; border-radius: 12px; font-size: 1rem; line-height: 1.6; outline: none; resize: vertical; font-family: inherit;"></textarea>
        </div>

        <div style="display: flex; gap: 15px; justify-content: flex-end;">
            <a href="{% url 'core:messages_inbox' %}" class="btn" style="text-decoration: none; padding: 14px 24px; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="x" style="width: 18px; height: 18px;"></i> Cancel
            </a>
            <button type="submit" class="btn" style="background: #2563EB; color: white; border: none; padding: 14px 32px; font-weight: 700; display: flex; align-items: center; gap: 10px;">
                <i data-lucide="send" style="width: 18px; height: 18px;"></i> Send Email
            </button>
        </div>
    </form>
</div>

<style>
    input:focus, textarea:focus { border-color: #2563EB !important; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
</style>
{% endblock %}
